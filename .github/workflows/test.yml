name: Test Pull Request

on: 
  pull_request:
    branches:
      - main

jobs:
  test-all:
    runs-on: ubuntu-latest
    container:
      image: node:20
    steps:
      - uses: actions/checkout@v3
      - run: npm install --prefix bolt_slack
      - run: npm install --prefix mongo_storage
      - run: npm test
